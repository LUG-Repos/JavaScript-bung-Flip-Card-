<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampf der Heere - Login</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="scripts/auth.js" defer></script>
</head>
<body>
    <div class="main_menu">
        <h1>Login</h1>
        <form class="login_and_register" id="loginForm">
            <label for="username">Benutzername:</label>
            <input type="text" id="username" name="username" placeholder="Benutzername" required>
            <label for="password">Passwort:</label>
            <input type="password" id="password" name="password" placeholder="Passwort" required>
            <button type="submit">Einloggen</button>
            <button type="button" onclick="window.location.href='/register'">Registrieren</button>
        </form>
    </div>
</body>
</html>
